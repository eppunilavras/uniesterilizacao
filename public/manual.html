        body { font-family: 'Noto Sans', sans-serif; }
        .unilavras-blue { color: #009DE0; }
        .bg-unilavras-blue { background-color: #009DE0; }
        .unilavras-dark { color: #021D34; }
        .bg-unilavras-dark { background-color: #021D34; }
        
        .role-card:hover { transform: translateY(-5px); }
        
        .sidebar-item.active {
            background-color: #009DE0;
            color: white;
            border-left: 4px solid #fff;
        }

        /* Simulação da Etiqueta Térmica */
        .sticker-preview {
            width: 300px;
            height: 180px;
            background-color: white;
            border: 1px solid #ddd;
            padding: 10px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            font-family: 'Arial', sans-serif;
            position: relative;
        }
        
        .sticker-barcode {
            font-family: 'Libre Barcode 39 Text', cursive;
            font-size: 36px;
            text-align: center;
            line-height: 1;
        }

        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Mockup Containers */
        .mockup-container {
            font-family: 'Noto Sans', sans-serif; /* Garante que o mockup use a mesma fonte do app */
            user-select: none; /* Evita seleção de texto no mockup */
        }

</head>

                        <i data-lucide="package-plus" class="w-8 h-8"></i>
                    </div>
                    <h3 class="text-xl font-bold text-slate-800 mb-2">Técnico</h3>
                    <p class="text-sm text-slate-500">Recepção de itens, impressão de etiquetas, controle de fluxo e gestão de alunos.</p>
                </button>

                <!-- Card Admin -->
                <button onclick="loadManual('admin')" class="role-card bg-white p-8 rounded-2xl shadow-lg border border-slate-100 transition-all duration-300 group hover:border-purple-600 text-left relative overflow-hidden">

                    </div>

                    <p class="text-sm text-slate-500">Gestão completa (CRUD), auditoria de logs, tipos de materiais e backups.</p>
                </button>
            </div>
        </main>
        
        <footer class="text-center py-6 text-slate-400 text-sm">
            &copy; 2025 Unilavras

        // --- FUNÇÕES DE NAVEGAÇÃO ---
        const landingView = document.getElementById('landing-view');
        const manualView = document.getElementById('manual-view');
        const sidebarNav = document.getElementById('sidebar-nav');
        const sidebarTitle = document.getElementById('sidebar-role-title');
        const contentTitle = document.getElementById('content-title');
        const contentBody = document.getElementById('content-body');
        
        let currentRole = null;

        function loadManual(role) {
            currentRole = role;
            
            const titles = {
                'student': 'Perfil Aluno',
                'tech': 'Perfil Técnico',
                'admin': 'Administrador'
            };
            sidebarTitle.innerText = titles[role];

            generateSidebar(role);
            loadContent('common', 'intro'); // Start with common intro

            landingView.classList.add('hidden');
            manualView.classList.remove('hidden');
            
            lucide.createIcons();
        }

        function goBack() {
            manualView.classList.add('hidden');
            landingView.classList.remove('hidden');
        }

        function generateSidebar(role) {
            sidebarNav.innerHTML = '';

            const createItem = (key, cat, label, icon) => {
                const btn = document.createElement('button');
                btn.className = `sidebar-item w-full flex items-center gap-3 px-6 py-3 text-sm font-medium hover:bg-white/5 hover:text-white transition-all text-left text-slate-300`;
                btn.innerHTML = `<i data-lucide="${icon}" class="w-4 h-4"></i> ${label}`;
                btn.onclick = () => {
                    document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    loadContent(cat, key);
                };
                return btn;
            };

            // Common Items
            sidebarNav.appendChild(createItem('intro', 'common', 'Acesso e Segurança', 'shield-check'));
            sidebarNav.appendChild(createItem('profile', 'common', 'Meu Perfil', 'user-circle'));
            
            sidebarNav.appendChild(document.createElement('hr')).className = "border-white/10 my-2 mx-4";

            // Role Specific Items
            if (role === 'student') {
                sidebarNav.appendChild(createItem('dashboard', 'student', 'Dashboard & Cores', 'palette'));
                sidebarNav.appendChild(createItem('history', 'student', 'Histórico e Busca', 'history'));
            }
            if (role === 'tech') {
                sidebarNav.appendChild(createItem('reception', 'tech', 'Recepção (Entrada)', 'package-plus'));
                sidebarNav.appendChild(createItem('movement', 'tech', 'Movimentação e Áudio', 'scan-barcode'));
                sidebarNav.appendChild(createItem('print_setup', 'tech', 'Configurar Impressora', 'printer'));
                sidebarNav.appendChild(createItem('users_manage', 'tech', 'Gestão de Alunos', 'users'));
            }
            if (role === 'admin') {
                sidebarNav.appendChild(createItem('dashboard_admin', 'admin', 'Painel BI', 'bar-chart-3'));
                sidebarNav.appendChild(createItem('users_admin', 'admin', 'Gestão de Usuários', 'users'));
                sidebarNav.appendChild(createItem('materials_mgmt', 'admin', 'Gestão de Materiais', 'package'));
                sidebarNav.appendChild(createItem('admin_tools', 'admin', 'Recados e Backup', 'settings-2'));
                sidebarNav.appendChild(createItem('logs', 'admin', 'Logs de Auditoria', 'file-text'));
            }
            
            // Auto-activate first item
            sidebarNav.firstChild.classList.add('active');
        }

        function loadContent(category, key) {
            const data = MANUAL_DATA[category][key];
            
            // Animação de fade out/in
            contentBody.classList.remove('fade-in');
            void contentBody.offsetWidth; // Force reflow
            contentBody.classList.add('fade-in');

            contentTitle.innerText = data.title;
            contentBody.innerHTML = data.content;
            
            // Re-renderizar ícones dentro do novo conteúdo
            lucide.createIcons();
            
            // Scroll to top on content change
            document.querySelector('main').scrollTop = 0;
        }

        // --- INTEGRAÇÃO COM APP (AUTO-LOAD) ---
        // Verifica se há um parâmetro ?role=... na URL ao carregar
        window.addEventListener('load', () => {
            const params = new URLSearchParams(window.location.search);
            const roleParam = params.get('role');
            
            // Se houver um role válido na URL, carrega direto
            if (roleParam && ['student', 'tech', 'admin'].includes(roleParam)) {
                loadManual(roleParam);
            }
            
            lucide.createIcons();
        });

    </script>
</body>
